# WorkShield AI — NGINX reverse proxy
#
# Routing:
#   /       → Next.js frontend  (container: client:3000)
#   /api/*  → Express backend   (container: backend:4000)
#   /ai/*   → Python AI service (container: ai-service:5001)
#
# All traffic enters on port 80. TLS termination should be added
# in front of this (e.g., Cloudflare, AWS ALB, or certbot/nginx SSL block).

upstream frontend {
    server client:3000;
}

upstream backend {
    server backend:4000;
}

upstream ai_service {
    server ai-service:5001;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # ── Express backend: /api ─────────────────────────────────────────────────
    # Requests are forwarded with the /api prefix intact so Express routes
    # registered as /api/auth, /api/policies, /api/claims match correctly.
    location /api {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Python AI service: /ai ────────────────────────────────────────────────
    # Strip the /ai prefix before forwarding so Flask sees /predict, /fraud-check.
    # Frontend calls /ai/predict → Flask receives /predict.
    location /ai/ {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass       http://ai_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Next.js frontend: / ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
