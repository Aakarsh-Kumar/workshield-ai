services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: workshield-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: workshield
    ports:
      - "27017:27017"      # Expose for local Compass/Atlas tools in dev
    volumes:
      - mongo_data:/data/db
    networks:
      - workshield-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workshield-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/workshield
      JWT_SECRET: ${JWT_SECRET:-insecure_dev_secret_change_in_prod}
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      AI_SERVICE_URL: http://ai-service:5001
      CLIENT_URL: http://localhost
    networks:
      - workshield-net

  # ── Python AI service ──────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: workshield-ai
    restart: unless-stopped
    networks:
      - workshield-net

  # ── Next.js frontend ───────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: workshield-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NEXT_PUBLIC_AI_BASE: /ai
    depends_on:
      - backend
    networks:
      - workshield-net

  # ── NGINX reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - client
      - backend
      - ai-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - workshield-net

# ── Persistent volumes ─────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Internal network ───────────────────────────────────────────────────────
networks:
  workshield-net:
    driver: bridge
