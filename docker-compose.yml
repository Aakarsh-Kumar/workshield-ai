version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: workshield-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: workshield
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: workshield-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/workshield
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      AI_SERVICE_URL: http://ai-service:5001
      CLIENT_URL: https://workshield.aakarsh.xyz
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    expose:
      - "4000"
    networks:
      - shared-net

  ai-service:
    build:
      context: ./ai-service
    container_name: workshield-ai
    restart: unless-stopped
    environment:
      WORKSHIELD_EXPORT_ROOT: /ml-export
    volumes:
      - ./workshield_export:/ml-export:ro
    expose:
      - "5001"
    networks:
      - shared-net

  client:
    build:
      context: ./client
    container_name: workshield-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost/api
      NEXT_PUBLIC_AI_BASE: http://localhost/ai
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - shared-net

  nginx:
    image: nginx:stable-alpine
    container_name: workshield-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - client
      - backend
      - ai-service
    networks:
      - shared-net

volumes:
  mongo_data:

networks:
  shared-net:
    external: true
