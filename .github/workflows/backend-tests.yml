name: backend-tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  integration-and-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for backend health
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check timed out"
          docker compose logs backend
          exit 1

      - name: Wait for ai-service health
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost/ai/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "AI health check timed out"
          docker compose logs ai-service
          exit 1

      - name: Run backend tests
        working-directory: backend
        env:
          WORKSHIELD_BASE_URL: http://localhost
        run: npm test

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail 300

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
